<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LSC44NDPLQ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LSC44NDPLQ');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Studio GitHub Copilot Lab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link rel="alternate" hreflang="en" href="https://copilot-dev-days.github.io/visual-studio-lab/">
    <link rel="alternate" hreflang="pt-BR" href="https://copilot-dev-days.github.io/visual-studio-lab/pt_BR/">
    <link rel="alternate" hreflang="es" href="https://copilot-dev-days.github.io/visual-studio-lab/es/">
    <link rel="alternate" hreflang="x-default" href="https://copilot-dev-days.github.io/visual-studio-lab/">
    <link rel="stylesheet" href="../step.css">
    <link rel="stylesheet" href="../light-theme.css">
    <script src="../theme-toggle.js"></script>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="index.html" class="header-brand">
                <span>🚀</span>
                <span class="header-title">VS GitHub Copilot Lab</span>
            </a>
            <nav class="header-nav">
                <div class="locale-picker" id="localePicker">
                    <button type="button" class="locale-toggle" aria-haspopup="listbox" aria-expanded="false" aria-label="Selecionar idioma">🌐</button>
                    <ul role="listbox" aria-label="Language">
                        <li role="option" data-locale="en" aria-selected="false">🇬🇧 English</li>
                        <li role="option" data-locale="es" aria-selected="false">🇪🇸 Español</li>
                        <li role="option" data-locale="pt-BR" aria-selected="true" class="active">🇧🇷 Português (Brasil)</li>
                    </ul>
                </div>
                <button class="theme-toggle" onclick="toggleTheme()">☀️ Claro</button>
                <button class="nav-btn" id="prevBtn" disabled>← Anterior</button>
                <button class="nav-btn" id="nextBtn">Próximo →</button>
            </nav>
        </div>
    </header>

    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-title">Partes do Workshop</div>
                <nav id="stepNav"></nav>
            </div>
        </aside>

        <main class="main">
            <article class="content">
                <div id="markdown-content" class="markdown">
                    <div class="loading">Carregando conteúdo</div>
                </div>
                <nav class="nav-footer">
                    <a href="#" class="nav-footer-btn disabled" id="prevLink">← Anterior</a>
                    <a href="#" class="nav-footer-btn" id="nextLink">Próximo →</a>
                </nav>
            </article>
        </main>
    </div>

    <script>
        // Define all steps in order
        const steps = [
            { id: 'setup', file: 'setup.md', title: 'Configuração & Setup', number: '00' },
            { id: 'part00-exploring-codebase', file: 'part00-exploring-codebase.md', title: 'Explorando o Código', number: '01' },
            { id: 'part01-code-completion', file: 'part01-code-completion.md', title: 'Code Completion', number: '02' },
            { id: 'part02-enhancing-ui', file: 'part02-enhancing-ui.md', title: 'Aprimorando a UI', number: '03' },
            { id: 'part03-referencing-files', file: 'part03-referencing-files.md', title: 'Referenciando Arquivos', number: '04' },
            { id: 'part04-custom-instructions', file: 'part04-custom-instructions.md', title: 'Instruções Personalizadas', number: '05' },
            { id: 'part05-implementing-features', file: 'part05-implementing-features.md', title: 'Agent Mode', number: '06' },
            { id: 'part06-copilot-vision', file: 'part06-copilot-vision.md', title: 'Copilot Vision', number: '07' },
            { id: 'part07-debugging-with-copilot', file: 'part07-debugging-with-copilot.md', title: 'Depuração', number: '08' },
            { id: 'part08-commit-summary-descriptions', file: 'part08-commit-summary-descriptions.md', title: 'Resumos de Commit', number: '09' },
            { id: 'part09-mcp', file: 'part09-mcp.md', title: 'MCP Servers', number: '10' },
            { id: 'part10-planning-mode', file: 'part10-planning-mode.md', title: 'Modo de Planejamento', number: '11' },
            { id: 'part11-reusable-prompts', file: 'part11-reusable-prompts.md', title: 'Arquivos de Prompt', number: '12' },
            { id: 'part12-delegate-to-cloud', file: 'part12-delegate-to-cloud.md', title: 'Delegação para Nuvem', number: '13' },
        ];

        // Get current step from URL
        function getCurrentStepId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('step') || 'setup';
        }

        function getCurrentStepIndex() {
            const stepId = getCurrentStepId();
            return steps.findIndex(s => s.id === stepId);
        }

        // Build sidebar navigation
        function buildSidebar() {
            const nav = document.getElementById('stepNav');
            const currentId = getCurrentStepId();
            
            nav.innerHTML = steps.map(step => `
                <a href="?step=${step.id}" class="step-link ${step.id === currentId ? 'active' : ''}">
                    <span class="step-number">${step.number}</span>
                    <span>${step.title}</span>
                </a>
            `).join('');
        }

        // Update navigation buttons
        function updateNavigation() {
            const idx = getCurrentStepIndex();
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const prevLink = document.getElementById('prevLink');
            const nextLink = document.getElementById('nextLink');

            // Header buttons
            prevBtn.disabled = idx <= 0;
            nextBtn.disabled = idx >= steps.length - 1;

            prevBtn.onclick = () => idx > 0 && (window.location.search = `?step=${steps[idx - 1].id}`);
            nextBtn.onclick = () => idx < steps.length - 1 && (window.location.search = `?step=${steps[idx + 1].id}`);

            // Footer links
            if (idx > 0) {
                prevLink.href = `?step=${steps[idx - 1].id}`;
                prevLink.textContent = `← ${steps[idx - 1].title}`;
                prevLink.classList.remove('disabled');
            } else {
                prevLink.classList.add('disabled');
                prevLink.textContent = '← Anterior';
            }

            if (idx < steps.length - 1) {
                nextLink.href = `?step=${steps[idx + 1].id}`;
                nextLink.textContent = `${steps[idx + 1].title} →`;
                nextLink.classList.remove('disabled');
            } else {
                // Last step - link to completion page
                nextLink.href = 'complete.html';
                nextLink.textContent = '🎉 Workshop Completo!';
                nextLink.classList.remove('disabled');
                nextLink.style.background = 'linear-gradient(135deg, var(--neon-cyan), var(--neon-purple))';
            }
        }

        // Process markdown - fix image paths and handle special syntax
        function processMarkdown(md) {
            // Fix image paths - images are in lab/images/
            md = md.replace(/!\[([^\]]*)\]\(\.\/images\//g, '![$1](lab/images/');
            md = md.replace(/!\[([^\]]*)\]\(images\//g, '![$1](lab/images/');
            
            // Convert GitHub-style checkboxes: 1. [] becomes checkbox
            md = md.replace(/^(\d+)\.\s*\[\s*\]\s*/gm, '$1. <input type="checkbox"> ');
            
            // Handle GitHub alerts: [!NOTE], [!TIP], [!IMPORTANT], [!WARNING], [!CAUTION]
            md = md.replace(/> \[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]\s*\n((?:> .*(?:\n|$))*)/gi, function(match, type, content) {
                const cleanContent = content.replace(/^> ?/gm, '').trim();
                const icons = { NOTE: 'ℹ️', TIP: '💡', IMPORTANT: '❗', WARNING: '⚠️', CAUTION: '🔴' };
                const colors = { NOTE: 'var(--neon-cyan)', TIP: 'var(--success-green)', IMPORTANT: 'var(--neon-purple)', WARNING: 'var(--warning-yellow)', CAUTION: '#ff6b6b' };
                const icon = icons[type.toUpperCase()] || 'ℹ️';
                const color = colors[type.toUpperCase()] || 'var(--neon-cyan)';
                return `<blockquote style="border-left-color: ${color};"><p style="color: ${color};">${icon} ${type.toUpperCase()}</p><p>${cleanContent}</p></blockquote>\n`;
            });

            // Remove navigation links at the bottom (we have our own)
            md = md.replace(/---\s*\n\s*\[Back:.*$/s, '');
            md = md.replace(/---\s*\n\s*\[Next:.*$/s, '');

            return md;
        }

        // Load and render markdown
        async function loadContent() {
            const idx = getCurrentStepIndex();
            if (idx === -1) {
                document.getElementById('markdown-content').innerHTML = '<p>Passo não encontrado. <a href="?step=setup">Ir para Configuração</a></p>';
                return;
            }

            const step = steps[idx];
            document.title = `${step.title} | VS GitHub Copilot Lab`;

            try {
                // Fetch markdown from lab/pt_BR folder
                const response = await fetch(`lab/pt_BR/${step.file}`);
                if (!response.ok) throw new Error('Falha ao carregar');
                
                let md = await response.text();
                md = processMarkdown(md);
                
                // Configure marked
                marked.setOptions({
                    breaks: true,
                    gfm: true
                });

                document.getElementById('markdown-content').innerHTML = marked.parse(md);

                // Fire confetti on last step
                if (idx === steps.length - 1 && typeof confetti === 'function') {
                    confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
                }
            } catch (error) {
                document.getElementById('markdown-content').innerHTML = `
                    <h1>Erro ao Carregar Conteúdo</h1>
                    <p>Não foi possível carregar ${step.file}. Verifique se o arquivo existe.</p>
                    <p><a href="index.html">Voltar ao início</a></p>
                `;
            }
        }

        // Initialize
        buildSidebar();
        updateNavigation();
        loadContent();

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const idx = getCurrentStepIndex();
            if (e.key === 'ArrowLeft' && idx > 0) {
                window.location.search = `?step=${steps[idx - 1].id}`;
            } else if (e.key === 'ArrowRight' && idx < steps.length - 1) {
                window.location.search = `?step=${steps[idx + 1].id}`;
            }
        });
    </script>

    <script>
    (function(){
      var match=location.pathname.match(/\/(pt_BR|es)\//);
      var locale=match?match[1]:'en';
      var picker=document.getElementById('localePicker');
      if(!picker)return;
      var btn=picker.querySelector('.locale-toggle'),list=picker.querySelector('ul');
      list.querySelectorAll('li').forEach(function(li){
        var l=li.dataset.locale==='pt-BR'?'pt_BR':li.dataset.locale;
        if(l===locale){li.classList.add('active');li.setAttribute('aria-selected','true');}
        else{li.classList.remove('active');li.setAttribute('aria-selected','false');}
      });
      function open(){list.style.display='block';btn.setAttribute('aria-expanded','true');}
      function close(){list.style.display='none';btn.setAttribute('aria-expanded','false');}
      btn.addEventListener('click',function(e){e.stopPropagation();list.style.display==='block'?close():open();});
      document.addEventListener('click',close);
      document.addEventListener('keydown',function(e){if(e.key==='Escape')close();});
      list.querySelectorAll('li').forEach(function(li){
        li.addEventListener('click',function(e){
          e.stopPropagation();
          var t=li.dataset.locale==='pt-BR'?'pt_BR':li.dataset.locale;
          if(t===locale){close();return;}
          var p=location.pathname;
          if(locale!=='en')p=p.replace(new RegExp('/'+locale+'/'),'/');;
          if(t!=='en'){var base=p.replace(/\/index\.html$/,'/');if(!base.endsWith('/'))base+='/';p=base+t+'/';}
          localStorage.setItem('preferred-locale',t);
          window.location.href=p;
        });
      });
    })();
    </script>
</body>
</html>
